<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>England World Cup Countdown</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="hero">
    <h1>🏴 England World Cup Countdown</h1>
    <p>Live countdown to England's 2026 World Cup journey</p>

    <div id="countdown" class="countdown"></div>
  </header>

  <main>
    <section>
      <h2>📅 England Fixtures</h2>
      <div id="fixtures"></div>
    </section>

    <section id="lineups-section" style="display:none;">
      <h2>🚨 England Starting XI</h2>
      <div id="lineups"></div>
    </section>

    <section id="live-section" style="display:none;">
      <h2>⚽ Live Match</h2>
      <div id="live-match"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
