<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>England World Cup Hub</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>
  <header class="hero">
    <h1>🏴 England World Cup Hub</h1>

    <div id="countdown" class="countdown"></div>

    <p>Live fixtures, lineups & scores</p>
  </header>

  <main>
    <section>
  <div id="first-countdown"></div>
</section>
    <section>
      <h2>📅 Next England Match</h2>
      <div id="next-match"></div>
    </section>

    <section id="lineups-section" style="display:none;">
      <h2>🚨 England Lineup</h2>
      <div id="lineups"></div>
    </section>

    <section id="live-section" style="display:none;">
      <h2>⚽ Live Match</h2>
      <div id="live"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
